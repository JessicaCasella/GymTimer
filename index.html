<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo2.png">
  <title>GymTimer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      <img src="gymtimerlogo.png" alt="GymTimer Logo">
    </div>

    <div class="top-controls">

      <button onclick="createTimer(420,'bike','CALENTAMIENTO 7 MIN')">
        + CALENTAMIENTO 7 MIN
      </button>

      <button onclick="createTimer(600,'bike','CALENTAMIENTO 10 MIN')">
        + CALENTAMIENTO 10 MIN
      </button>

      <button onclick="createGymCircuit()">
        + CIRCUITO 15 MIN
      </button>

      <button onclick="createPlankWorkout(4)">
        + PLANCHAS x4
      </button>

      <button onclick="createPlankWorkout(3)">
        + PLANCHAS x3
      </button>

    </div>

  </header>



  <!-- LAYOUT PRINCIPAL -->
  <div class="layout">

    <!-- BARRA LATERAL DE TIEMPOS -->
    <div class="side-times">

      <button onclick="createSecondsTimer(15)">15 SEG</button>
      <button onclick="createSecondsTimer(30)">30 SEG</button>
      <button onclick="createSecondsTimer(45)">45 SEG</button>

      <button onclick="createCustomTimer(1)">1 MIN</button>
      <button onclick="createCustomTimer(5)">5 MIN</button>
      <button onclick="createCustomTimer(10)">10 MIN</button>
      <button onclick="createCustomTimer(15)">15 MIN</button>
      <button onclick="createCustomTimer(20)">20 MIN</button>
      <button onclick="createCustomTimer(30)">30 MIN</button>
      <button onclick="createCustomTimer(45)">45 MIN</button>
      <button onclick="createCustomTimer(60)">1 HORA</button>

    </div>


    <!-- TIMERS -->
    <div id="timers"></div>

  </div>



  <!-- BOTON TIMER PERSONALIZADO -->
  <div class="custom-creator">
    <button onclick="openCustomTimer()">
      + TIMER PERSONALIZADO
    </button>
  </div>



  <!-- PANEL DE CREACION -->
  <div id="customPanel" class="custom-panel hidden">

    <div class="custom-time">

      <button onclick="changeMinutes(-1)">-</button>

      <span id="customMinutes">5</span>
      <span>MIN</span>

      <button onclick="changeMinutes(1)">+</button>

    </div>

    <button onclick="createSelectedTimer()">
      CREAR TIMER
    </button>

  </div>



  <!-- FOOTER -->
  <footer class="footer">

    <span>JessicaCasella</span>

    <a href="https://www.linkedin.com/in/jessicacaselladuarte/"
       target="_blank">
       LinkedIn
    </a>

  </footer>


  <script src="app.js"></script>

</body>

</html>
